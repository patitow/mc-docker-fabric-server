# Minecraft (Fabric) + DDNS Cloudflare (opcional).
#
# --- Só o servidor ---
#   docker compose up -d
#
# --- Com DDNS (atualiza o A de mine.patitow.dev no Cloudflare) ---
#   Preenche .env (CLOUDFLARE_API_TOKEN, DDNS_DOMAINS). Depois:
#   docker compose --profile ddns up -d
#
# --- mine.patitow.dev (vanilla: domínio → IP público) ---
# 1. Router: port forward TCP 25565 → IP deste PC na LAN.
# 2. Cloudflare DNS: registo A para mine (ou o que meteres em DDNS_DOMAINS)
#    com proxy DESLIGADO (DNS only / nuvem cinzenta). O DDNS cria/atualiza o A.
# 3. API Token (dash.cloudflare.com → My Profile → API Tokens):
#    permissões típicas: Zone → DNS → Edit (+ Zone → Zone → Read se o template pedir).
# 4. Copia .env.example → .env e preenche CLOUDFLARE_API_TOKEN (e DDNS_DOMAINS se mudares o nome).
# 5. Sobe Minecraft + DDNS:
#   docker compose --profile ddns up -d
#
# Logs do DDNS: docker compose logs -f cloudflare-ddns

services:
  minecraft:
    build: .
    container_name: fabric-mc
    ports:
      - "25565:25565"
    environment:
      EULA: "true"
      MEMORY: 4G
      SERVER_JAR: fabric-server-mc.26.1.2-loader.0.19.2-launcher.1.1.1.jar
    # Bind mount: NADA é apagado ao parar o container. Mundo = ./world (level-name),
    # configs = ./config, ./server.properties, etc. — tudo fica no disco do Windows.
    # Servidor Fabric precisa do .jar + libraries/ + mods/ no mesmo diretório (como no run.bat).
    volumes:
      - .:/data
    stdin_open: true
    tty: true
    restart: unless-stopped

  cloudflare-ddns:
    image: favonia/cloudflare-ddns:1
    container_name: cloudflare-ddns-mine
    profiles: ["ddns"]
    restart: unless-stopped
    environment:
      CLOUDFLARE_API_TOKEN: ${CLOUDFLARE_API_TOKEN:-}
      DOMAINS: ${DDNS_DOMAINS:-mine.patitow.dev}
      # Minecraft precisa de tráfego direto (não proxy laranja).
      PROXIED: "false"
      # Evita avisos em redes só IPv4 (comum em casa).
      IP6_PROVIDER: "none"
